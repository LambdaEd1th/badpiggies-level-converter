<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Piggies Level Viewer</title>
<!-- Include js-yaml for YAML parsing directly in the browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1e1e1e;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #canvas {
    display: block;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #canvas:active { cursor: grabbing; }
  
  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.3s;
  }
  #overlay.hidden { opacity: 0; }
  #overlay h1 { font-size: 2.5rem; margin: 0; color: #76FF03; }
  #overlay p { color: #ccc; margin-top: 15px; font-size: 1.2rem; }
  
  #ui {
    position: absolute;
    top: 15px; left: 15px;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #333;
    pointer-events: none;
    backdrop-filter: blur(4px);
  }
  #status { font-weight: bold; font-size: 1.1rem; color: #64FFDA; margin-bottom: 5px; }
  .controls-help { color: #aaa; font-size: 0.9rem; line-height: 1.4; }
  
  .file-input-wrapper { pointer-events: auto; margin-top: 10px; }
  input[type=file] { color: white; }
</style>
</head>
<body>

<div id="overlay">
  <h1>Bad Piggies Level Viewer</h1>
  <p>Drag and drop a <b>.yaml</b> or <b>.json</b> level file anywhere</p>
</div>

<div id="ui">
  <div id="status">Waiting for file...</div>
  <div class="controls-help">
    • Drag to Pan<br/>
    • Scroll to Zoom
  </div>
  <div class="file-input-wrapper">
    <input type="file" id="filePicker" accept=".yaml,.yml,.json" />
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const status = document.getElementById('status');
const filePicker = document.getElementById('filePicker');

let levelData = null;

// Camera state
let cam = { x: 0, y: 0, zoom: 15 }; // 1 world unit = 15 pixels
let isDragging = false;
let startDrag = { x: 0, y: 0 };

// Auto resize
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  render();
}
window.addEventListener('resize', resize);
resize();

// Drop Handlers
window.addEventListener('dragover', e => { 
  e.preventDefault(); 
  overlay.classList.remove('hidden'); 
  overlay.style.background = 'rgba(0,0,0,0.95)';
});
window.addEventListener('dragleave', e => { 
  e.preventDefault(); 
  if (levelData) overlay.classList.add('hidden'); 
  overlay.style.background = 'rgba(0,0,0,0.85)';
});
window.addEventListener('drop', e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});
filePicker.addEventListener('change', e => {
  handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file) return;
  overlay.classList.add('hidden');
  status.textContent = `Loading ${file.name}...`;
  status.style.color = '#FFB300';
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const text = e.target.result;
      if (file.name.endsWith('.json')) {
        levelData = JSON.parse(text);
      } else {
        levelData = jsyaml.load(text);
      }
      
      status.textContent = `Loaded ${file.name} (${levelData.object_count} objects)`;
      status.style.color = '#76FF03';
      
      // Attempt to auto-center on LevelStart or center of everything
      autoCenter();
      render();
    } catch(err) {
      status.textContent = `Error: ${err.message}`;
      status.style.color = '#FF5252';
      console.error(err);
      overlay.classList.remove('hidden');
    }
  };
  reader.readAsText(file);
}

// Interactivity
canvas.addEventListener('mousedown', e => { 
  isDragging = true; 
  startDrag = { x: e.clientX, y: e.clientY }; 
});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  cam.x += (e.clientX - startDrag.x);
  cam.y += (e.clientY - startDrag.y);
  startDrag = { x: e.clientX, y: e.clientY };
  render();
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  const mx = e.clientX;
  const my = e.clientY;
  
  // Convert screen mouse to world coordinate
  const wx = (mx - canvas.width/2 - cam.x) / cam.zoom;
  const wy = (my - canvas.height/2 - cam.y) / -cam.zoom;

  cam.zoom *= zoomFactor;
  if (cam.zoom < 0.1) cam.zoom = 0.1;
  if (cam.zoom > 500) cam.zoom = 500;
  
  cam.x = mx - canvas.width/2 - wx * cam.zoom;
  cam.y = my - canvas.height/2 - wy * -cam.zoom;
  render();
}, { passive: false });

function autoCenter() {
  cam.x = 0; cam.y = 0; cam.zoom = 15;
  if (!levelData || !levelData.objects) return;
  
  let startObj = levelData.objects.find(o => o.name === "LevelStart" || o.name === "Start");
  if (!startObj) startObj = levelData.objects[0];
  if (startObj && startObj.position) {
    cam.x = -startObj.position.x * cam.zoom;
    cam.y = startObj.position.y * cam.zoom; // Y flipped
  }
}

// Rendering
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.save();
  // Transform screen to world camera
  ctx.translate(canvas.width / 2 + cam.x, canvas.height / 2 + cam.y);
  // Game Y is UP. Canvas Y is DOWN. Flip Y.
  ctx.scale(cam.zoom, -cam.zoom);
  
  // Draw World Origin Axes
  ctx.lineWidth = 2 / cam.zoom;
  ctx.strokeStyle = "rgba(255, 0, 0, 0.6)";
  ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(100, 0); ctx.stroke();
  ctx.strokeStyle = "rgba(0, 255, 0, 0.6)";
  ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 100); ctx.stroke();

  if (levelData && levelData.objects) {
    for (const obj of levelData.objects) {
      drawNode(obj);
    }
  }
  ctx.restore();
}

function drawNode(node) {
  ctx.save();
  const pos = node.position || {x:0, y:0, z:0};
  const rot = node.rotation || {x:0, y:0, z:0};
  const scl = node.scale || {x:1, y:1, z:1};

  ctx.translate(pos.x, pos.y);
  ctx.rotate(rot.z * Math.PI / 180);
  ctx.scale(scl.x, scl.y);

  // Render Attached Data
  let renderedAsShape = false;
  if (node.data && node.data.type === "Terrain") {
    const mesh = node.data.fill_mesh;
    if (mesh && mesh.vertices && mesh.triangles) {
      ctx.beginPath();
      for (let i = 0; i < mesh.triangles.length; i += 3) {
        const v0 = mesh.vertices[mesh.triangles[i]];
        const v1 = mesh.vertices[mesh.triangles[i+1]];
        const v2 = mesh.vertices[mesh.triangles[i+2]];
        if (v0 && v1 && v2) {
          ctx.moveTo(v0.x, v0.y);
          ctx.lineTo(v1.x, v1.y);
          ctx.lineTo(v2.x, v2.y);
        }
      }
      ctx.closePath();
      
      const c = node.data.fill_color;
      if (c) {
        ctx.fillStyle = `rgba(${Math.round(c.r*255)}, ${Math.round(c.g*255)}, ${Math.round(c.b*255)}, ${c.a})`;
      } else {
        ctx.fillStyle = "rgba(100, 150, 40, 0.8)";
      }
      ctx.fill();
      ctx.lineWidth = 1 / cam.zoom;
      ctx.strokeStyle = "rgba(0,0,0,0.4)";
      ctx.stroke();
      renderedAsShape = true;
    }
  }

  // Draw object marker if it's not purely a 2D terrain mesh
  if (!renderedAsShape) {
    // Determine Icon
    const n = (node.name || "").toLowerCase();
    let text = "📦";
    let color = "#aaa";
    if (n.includes("goal")) { text = "🏁"; color = "#FFD54F"; }
    else if (n.includes("start")) { text = "🚩"; color = "#81C784"; }
    else if (n.includes("tnt")) { text = "💣"; color = "#E57373"; }
    else if (n.includes("dessert")) { text = "🍰"; color = "#F48FB1"; }
    else if (n.includes("challenge") || n.includes("star")) { text = "⭐"; color = "#FFF176"; }
    else if (n.includes("camera")) text = "🎥";
    else if (n.includes("manager") || n.includes("controller")) text = "⚙️";
    else if (n.includes("wind")) text = "💨";
    else if (node.kind === "Parent") text = "📁";
    
    // Draw Box
    ctx.lineWidth = 2 / cam.zoom;
    ctx.strokeStyle = color;
    ctx.beginPath(); ctx.rect(-0.5, -0.5, 1, 1); ctx.stroke();
    
    // Draw Icon (Flip Y back for text rendering)
    ctx.save();
    ctx.scale(1, -1);
    ctx.font = `${Math.max(1, 16/cam.zoom)}px Arial`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 0, 0);
    
    // Draw Name
    if (cam.zoom > 6) {
      ctx.font = `${Math.max(0.4, 10/cam.zoom)}px 'Segoe UI'`;
      ctx.fillStyle = "#fff";
      ctx.fillText(node.name, 0, -1.2);
    }
    ctx.restore();
  }

  // Draw Origin Point Pivot
  ctx.beginPath();
  ctx.arc(0, 0, Math.max(0.1, 3/cam.zoom), 0, Math.PI*2);
  ctx.fillStyle = "red";
  ctx.fill();

  // Recursively draw children
  if (node.children) {
    for (const child of node.children) {
      drawNode(child);
    }
  }

  ctx.restore();
}

</script>
</body>
</html>

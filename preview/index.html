<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Piggies Level Viewer</title>
    <!-- Include js-yaml for YAML parsing directly in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, -apple-system, Tahoma, Helvetica, sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #canvas:active {
            cursor: grabbing;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(30, 30, 40, 0.9) 0%, rgba(10, 10, 15, 0.98) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.4s ease-in-out;
        }

        #overlay.hidden {
            opacity: 0;
        }

        #overlay h1 {
            font-size: 3rem;
            margin: 0;
            color: #64FFDA;
            text-shadow: 0 4px 15px rgba(100, 255, 218, 0.3);
            letter-spacing: 1px;
        }

        #overlay p {
            color: #aaa;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 300;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 25, 0.65);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 5;
            min-width: 250px;
        }

        #status {
            font-weight: 600;
            font-size: 1.15rem;
            color: #64FFDA;
            margin-bottom: 8px;
        }

        .controls-help {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
        }

        .file-input-wrapper {
            pointer-events: auto;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 8px 16px;
            cursor: pointer;
            background: rgba(100, 255, 218, 0.1);
            color: #64FFDA;
            border: 1px solid rgba(100, 255, 218, 0.3);
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .custom-file-upload:hover {
            background: rgba(100, 255, 218, 0.2);
        }

        input[type=file] {
            display: none;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h1>Bad Piggies Level Viewer</h1>
        <p>Drag and drop a <b>.yaml</b> or <b>.json</b> file to preview</p>
    </div>

    <div id="ui">
        <div id="status">Ready.</div>
        <div class="controls-help">
            • Left Click + Drag to Pan<br />
            • Scroll Wheel to Zoom
        </div>
        <div class="file-input-wrapper">
            <label class="custom-file-upload">
                <input type="file" id="filePicker" accept=".yaml,.yml,.json,.bytes" />
                Open File...
            </label>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');
        const filePicker = document.getElementById('filePicker');

        let levelData = null;

        // Camera state
        let cam = { x: 0, y: 0, zoom: 20 }; // 1 world unit = 20 pixels
        let isDragging = false;
        let startDrag = { x: 0, y: 0 };

        // Auto resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }
        window.addEventListener('resize', resize);
        resize();

        // Drop Handlers
        window.addEventListener('dragover', e => {
            e.preventDefault();
            overlay.classList.remove('hidden');
            overlay.style.background = 'radial-gradient(circle at center, rgba(40, 40, 50, 0.95) 0%, rgba(10, 10, 15, 0.98) 100%)';
        });
        window.addEventListener('dragleave', e => {
            e.preventDefault();
            if (levelData) overlay.classList.add('hidden');
            overlay.style.background = 'radial-gradient(circle at center, rgba(30, 30, 40, 0.9) 0%, rgba(10, 10, 15, 0.98) 100%)';
        });
        window.addEventListener('drop', e => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        });
        filePicker.addEventListener('change', e => {
            handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            overlay.classList.add('hidden');
            status.textContent = `Loading ${file.name}...`;
            status.style.color = '#FFB300';

            if (file.name.endsWith('.bytes')) {
                status.textContent = `Unsupported binary. Use YAML/JSON.`;
                status.style.color = '#FF5252';
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const text = e.target.result;
                    if (file.name.endsWith('.json')) {
                        levelData = JSON.parse(text);
                    } else {
                        levelData = jsyaml.load(text);
                    }

                    status.textContent = `Loaded ${file.name} (${levelData.object_count} objects)`;
                    status.style.color = '#64FFDA';

                    autoCenter();
                    render();
                } catch (err) {
                    status.textContent = `Error: Parsing Failed`;
                    status.style.color = '#FF5252';
                    console.error(err);
                    overlay.querySelector('p').textContent = `Parse error: ${err.message}`;
                    overlay.classList.remove('hidden');
                }
            };
            reader.readAsText(file);
        }

        // Interactivity
        canvas.addEventListener('mousedown', e => {
            isDragging = true;
            startDrag = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            cam.x += (e.clientX - startDrag.x);
            cam.y += (e.clientY - startDrag.y);
            startDrag = { x: e.clientX, y: e.clientY };
            render();
        });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const mx = e.clientX;
            const my = e.clientY;

            // Convert screen mouse to world coordinate
            const wx = (mx - canvas.width / 2 - cam.x) / cam.zoom;
            const wy = (my - canvas.height / 2 - cam.y) / -cam.zoom; // Flipping Y

            cam.zoom *= zoomFactor;
            if (cam.zoom < 0.1) cam.zoom = 0.1;
            if (cam.zoom > 1000) cam.zoom = 1000; // Allow extreme optical zoom

            cam.x = mx - canvas.width / 2 - wx * cam.zoom;
            cam.y = my - canvas.height / 2 - wy * -cam.zoom; // Flipping Y
            render();
        }, { passive: false });

        function autoCenter() {
            cam.x = 0; cam.y = 0; cam.zoom = 20;
            if (!levelData || !levelData.objects) return;

            let startObj = levelData.objects.find(o => o.name === "LevelStart" || o.name === "Start");
            if (!startObj) startObj = levelData.objects[0];
            if (startObj && startObj.position) {
                cam.x = -startObj.position.x * cam.zoom;
                cam.y = startObj.position.y * cam.zoom; // flipped Y
            }
        }

        function drawGrid(minX, minY, maxX, maxY) {
            ctx.save();
            ctx.lineWidth = 1 / cam.zoom;

            // Minor grid lines (every 1 unit)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.beginPath();
            for (let x = Math.floor(minX); x <= Math.ceil(maxX); x++) {
                ctx.moveTo(x, Math.floor(minY)); ctx.lineTo(x, Math.ceil(maxY));
            }
            for (let y = Math.floor(minY); y <= Math.ceil(maxY); y++) {
                ctx.moveTo(Math.floor(minX), y); ctx.lineTo(Math.ceil(maxX), y);
            }
            ctx.stroke();

            // Major grid lines (every 10 units)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 2 / cam.zoom;
            ctx.beginPath();
            for (let x = Math.floor(minX / 10) * 10; x <= Math.ceil(maxX); x += 10) {
                ctx.moveTo(x, Math.floor(minY)); ctx.lineTo(x, Math.ceil(maxY));
            }
            for (let y = Math.floor(minY / 10) * 10; y <= Math.ceil(maxY); y += 10) {
                ctx.moveTo(Math.floor(minX), y); ctx.lineTo(Math.ceil(maxX), y);
            }
            ctx.stroke();

            // Draw World Origin Axes
            ctx.lineWidth = 3 / cam.zoom;
            ctx.strokeStyle = "rgba(255, 82, 82, 0.8)"; // X axis RED
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(10, 0); ctx.stroke();
            ctx.strokeStyle = "rgba(105, 240, 174, 0.8)"; // Y axis GREEN
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 10); ctx.stroke();

            ctx.restore();
        }

        // Rendering
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // Transform screen to world camera
            ctx.translate(canvas.width / 2 + cam.x, canvas.height / 2 + cam.y);
            // Game Y is UP. Canvas Y is DOWN. Flip Y.
            ctx.scale(cam.zoom, -cam.zoom);

            // Calculate visible bounds in world space
            const left = (-canvas.width / 2 - cam.x) / cam.zoom;
            const right = (canvas.width / 2 - cam.x) / cam.zoom;
            const bottom = (-canvas.height / 2 - cam.y) / -cam.zoom;
            const top = (canvas.height / 2 - cam.y) / -cam.zoom;

            const minX = Math.min(left, right);
            const maxX = Math.max(left, right);
            const minY = Math.min(bottom, top);
            const maxY = Math.max(bottom, top);

            drawGrid(minX, minY, maxX, maxY);

            if (levelData && levelData.objects) {
                for (const obj of levelData.objects) {
                    drawNode(obj, 1.0, 1.0);
                }
            }
            ctx.restore();
        }

        function getIconData(name) {
            const n = (name || "").toLowerCase();

            if (n.includes("goal")) return { text: "🏁", color: "rgba(255, 213, 79, 1.0)" };
            if (n.includes("start")) return { text: "🚩", color: "rgba(129, 199, 132, 1.0)" };
            if (n.includes("tnt")) return { text: "💣", color: "rgba(229, 115, 115, 1.0)" };
            if (n.includes("dessert")) return { text: "🍰", color: "rgba(244, 143, 177, 1.0)" };
            if (n.includes("box") || n.includes("crate")) return { text: "📦", color: "rgba(188, 170, 164, 1.0)" };
            if (n.includes("challenge") || n.includes("star")) return { text: "⭐", color: "rgba(255, 241, 118, 1.0)" };
            if (n.includes("camera")) return { text: "🎥", color: "rgba(144, 202, 249, 1.0)" };
            if (n.includes("manager") || n.includes("controller") || n.includes("system")) return { text: "⚙️", color: "rgba(176, 190, 197, 1.0)" };
            if (n.includes("wind")) return { text: "💨", color: "rgba(128, 222, 234, 1.0)" };
            if (n.includes("crystal")) return { text: "💎", color: "rgba(186, 104, 200, 1.0)" };
            if (n.includes("rock") || n.includes("stone")) return { text: "🪨", color: "rgba(141, 110, 99, 1.0)" };
            if (n.includes("grass") || n.includes("plant") || n.includes("flower") || n.includes("daisy") || n.includes("tuft") || n.includes("branch")) return { text: "🌿", color: "rgba(174, 213, 129, 1.0)" };
            if (n.includes("glow") || n.includes("light")) return { text: "✨", color: "rgba(255, 235, 59, 1.0)" };
            if (n.includes("cloud")) return { text: "☁️", color: "rgba(238, 238, 238, 1.0)" };

            return { text: "📌", color: "rgba(255, 255, 255, 0.7)" };
        }

        function drawNode(node, parentScaleX, parentScaleY) {
            ctx.save();
            const pos = node.position || { x: 0, y: 0, z: 0 };
            const rot = node.rotation || { x: 0, y: 0, z: 0 };
            const scl = node.scale || { x: 1, y: 1, z: 1 };

            ctx.translate(pos.x, pos.y);
            ctx.rotate(rot.z * Math.PI / 180);

            // Accumulate global scale. (Assuming simple hierarchy without severe shearing)
            const absScaleX = parentScaleX * scl.x;
            const absScaleY = parentScaleY * scl.y;

            ctx.scale(scl.x, scl.y); // Apply our local scale to context

            // 1. Render Terrain Mesh (needs scale)
            let renderedAsShape = false;
            if (node.data && node.data.type === "Terrain") {
                const mesh = node.data.fill_mesh;
                if (mesh && mesh.vertices && mesh.triangles) {
                    ctx.beginPath();
                    // Optimization: we could cull, but usually mesh isn't too large
                    for (let i = 0; i < mesh.triangles.length; i += 3) {
                        const v0 = mesh.vertices[mesh.triangles[i]];
                        const v1 = mesh.vertices[mesh.triangles[i + 1]];
                        const v2 = mesh.vertices[mesh.triangles[i + 2]];
                        if (v0 && v1 && v2) {
                            ctx.moveTo(v0.x, v0.y);
                            ctx.lineTo(v1.x, v1.y);
                            ctx.lineTo(v2.x, v2.y);
                        }
                    }
                    ctx.closePath();

                    const c = node.data.fill_color;
                    if (c) {
                        ctx.fillStyle = `rgba(${Math.round(c.r * 255)}, ${Math.round(c.g * 255)}, ${Math.round(c.b * 255)}, ${c.a})`;
                    } else {
                        ctx.fillStyle = "rgba(100, 150, 40, 0.8)";
                    }
                    ctx.fill();

                    ctx.lineWidth = 1 / cam.zoom / Math.max(absScaleX, absScaleY);
                    ctx.strokeStyle = "rgba(0,0,0,0.4)";
                    ctx.stroke();
                    renderedAsShape = true;
                }
            }

            // 2. Render Markers (Text, Icons, Bounds) INDEPENDENT of object scale!
            if (!renderedAsShape) {
                const isParent = node.kind === "Parent";
                const iconData = getIconData(isParent ? "folder" : node.name);
                if (isParent) iconData.text = "�";

                // Bounds Box (Scaled by object size to show area, e.g. Clouds scaling 80x60)
                ctx.lineWidth = 2 / cam.zoom / Math.max(Math.abs(scl.x), Math.abs(scl.y));
                ctx.strokeStyle = iconData.color;
                ctx.fillStyle = iconData.color.replace("1.0)", "0.08)");
                ctx.beginPath(); ctx.rect(-0.5, -0.5, 1, 1);
                ctx.fill();
                ctx.stroke();

                // Un-scale the context so text and pivot render pixel-perfect at screen space zoom size
                // We reverse local scale:
                const invX = scl.x !== 0 ? 1 / scl.x : 1;
                const invY = scl.y !== 0 ? 1 / scl.y : 1;

                ctx.save();
                ctx.scale(invX, invY);

                // Draw Icon (Flip Y back for text rendering)
                ctx.save();
                ctx.scale(1, -1);
                const fontSize = Math.max(8, 20 / cam.zoom);
                ctx.font = `${fontSize}px 'Segoe UI Emoji', Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(iconData.text, 0, 0);

                // Draw Name Label Below
                if (cam.zoom > 3) {
                    const labelFontSize = Math.max(0.2, 12 / cam.zoom);
                    ctx.font = `600 ${labelFontSize}px 'Segoe UI', system-ui`;
                    ctx.fillStyle = "#fff";
                    // Text Background for readability
                    ctx.shadowColor = "rgba(0,0,0,1)";
                    ctx.shadowBlur = 4 / cam.zoom;
                    ctx.fillText(node.name || "Unknown", 0, fontSize / 1.8 + labelFontSize); // Position below emoji
                    ctx.shadowBlur = 0;
                }
                ctx.restore();

                // Draw Origin Point Pivot
                ctx.beginPath();
                ctx.arc(0, 0, Math.max(0.05, 3 / cam.zoom), 0, Math.PI * 2);
                ctx.fillStyle = "#FF5252";
                ctx.fill();

                ctx.restore(); // Restore back to locally scaled context
            }

            // 3. Render Children Recursively
            if (node.children) {
                for (const child of node.children) {
                    drawNode(child, absScaleX, absScaleY);
                }
            }

            ctx.restore();
        }

    </script>
</body>

</html>
